<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Giỏ Hàng – YoYoSniper</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/shop.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="nav-brand">
    <div class="logo-ring"></div>
    <a href="../index.html" class="logo-text">YoYo<span class="accent">Sniper</span></a>
  </div>
  <ul class="nav-links" id="navLinks">
    <li><a href="../index.html" class="nav-link" data-page="home">Trang Chủ</a></li>
    <li><a href="shop.html" class="nav-link" data-page="shop">Cửa Hàng</a></li>
    <li><a href="contact.html" class="nav-link" data-page="contact">Liên Hệ</a></li>
    <li><a href="login.html" class="nav-link" data-page="login" id="loginNavBtn">Đăng Nhập</a></li>
    <li>
      <a href="cart.html" class="nav-link cart-icon active">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-badge" id="cartBadge">0</span>
      </a>
    </li>
  </ul>
  <button class="nav-toggle" id="navToggle"><i class="fas fa-bars"></i></button>
</nav>

<div class="page-header">
  <h1>Giỏ Hàng</h1>
  <p>Kiểm tra lại trước khi đặt hàng</p>
</div>

<section class="cart-section">
  <div class="container">
    <div class="cart-layout" id="cartLayout">
      <!-- Rendered by JS -->
    </div>
  </div>
</section>

<script src="../js/products.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', renderCartPage);

function renderCartPage() {
  const layout = document.getElementById('cartLayout');
  const cart = CartManager.get();

  if (cart.length === 0) {
    layout.innerHTML = `
      <div class="empty-cart" style="grid-column:1/-1">
        <div class="empty-icon">🛒</div>
        <h3>Giỏ hàng trống</h3>
        <p style="color:var(--gray);margin-bottom:32px;">Hãy thêm sản phẩm vào giỏ hàng</p>
        <a href="shop.html" class="btn-primary">Tiếp tục mua sắm</a>
      </div>`;
    return;
  }

  const itemsHtml = cart.map(item => `
    <div class="cart-item" id="ci-${item.id}">
      <div class="cart-item-img">${createYoYoSVG(item.color1, item.color2, item.color3, 80)}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${item.price.toLocaleString('vi-VN')}đ / chiếc</div>
      </div>
      <div class="cart-item-actions">
        <div class="qty-control">
          <button onclick="updateCartQty(${item.id}, ${item.qty - 1})">−</button>
          <span>${item.qty}</span>
          <button onclick="updateCartQty(${item.id}, ${item.qty + 1})">+</button>
        </div>
        <div style="font-weight:700;color:var(--orange);min-width:100px;text-align:right;">
          ${(item.price * item.qty).toLocaleString('vi-VN')}đ
        </div>
        <button class="btn-remove" onclick="removeFromCart(${item.id})"><i class="fas fa-trash"></i></button>
      </div>
    </div>`).join('');

  const total = CartManager.total();
  const ship = total >= 500000 ? 0 : 30000;

  layout.innerHTML = `
    <div class="cart-items-container">
      <h2>Sản Phẩm (${cart.length})</h2>
      ${itemsHtml}
      <div style="margin-top:20px;">
        <a href="shop.html" style="color:var(--orange);font-size:14px;"><i class="fas fa-arrow-left"></i> Tiếp tục mua sắm</a>
      </div>
    </div>
    <div class="cart-summary">
      <h3>Tóm Tắt Đơn</h3>
      <div class="summary-row"><span>Tạm tính</span><span>${total.toLocaleString('vi-VN')}đ</span></div>
      <div class="summary-row"><span>Vận chuyển</span><span>${ship === 0 ? '<span style="color:#22c55e">Miễn phí</span>' : ship.toLocaleString('vi-VN') + 'đ'}</span></div>
      ${total < 500000 ? `<div style="font-size:12px;color:var(--gray);margin-top:-8px;margin-bottom:8px;">Mua thêm ${(500000-total).toLocaleString('vi-VN')}đ để được miễn phí ship</div>` : ''}
      <div class="summary-row total"><span>Tổng cộng</span><span>${(total + ship).toLocaleString('vi-VN')}đ</span></div>
      <button class="btn-checkout" onclick="window.location.href='checkout.html'">
        <i class="fas fa-lock"></i> Thanh Toán Ngay
      </button>
      <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--gray);">
        <i class="fas fa-shield-alt"></i> Thanh toán an toàn & bảo mật
      </div>
    </div>`;
}

function updateCartQty(id, qty) {
  if (qty < 1) { removeFromCart(id); return; }
  CartManager.updateQty(id, qty);
  renderCartPage();
}

function removeFromCart(id) {
  CartManager.remove(id);
  renderCartPage();
  showToast('Đã xóa sản phẩm', 'error');
}
</script>
</body>
</html>
