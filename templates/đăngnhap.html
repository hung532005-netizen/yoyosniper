<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng Nhập – YoYoSniper</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/admin.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="nav-brand">
    <div class="logo-ring"></div>
    <a href="../index.html" class="logo-text">YoYo<span class="accent">Sniper</span></a>
  </div>
  <ul class="nav-links" id="navLinks">
    <li><a href="../index.html" class="nav-link">Trang Chủ</a></li>
    <li><a href="shop.html" class="nav-link">Cửa Hàng</a></li>
    <li><a href="cart.html" class="nav-link cart-icon"><i class="fas fa-shopping-cart"></i><span class="cart-badge" id="cartBadge">0</span></a></li>
  </ul>
  <button class="nav-toggle" id="navToggle"><i class="fas fa-bars"></i></button>
</nav>

<section class="auth-section">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-text">YoYo<span class="accent">Sniper</span></div>
      <p>Đăng nhập để trải nghiệm tốt hơn</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Đăng Nhập</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Đăng Ký</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="auth-form active" id="loginForm">
      <div class="form-group">
        <label>Email hoặc Tên đăng nhập</label>
        <input type="text" id="loginEmail" placeholder="email@example.com"/>
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <div style="position:relative;">
          <input type="password" id="loginPassword" placeholder="••••••••" style="padding-right:48px;"/>
          <button onclick="togglePwd('loginPassword',this)" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray);cursor:pointer;font-size:16px;"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <div class="forgot-link"><a href="#">Quên mật khẩu?</a></div>
      <button class="btn-full" onclick="doLogin()">
        <i class="fas fa-sign-in-alt"></i> Đăng Nhập
      </button>
      <div class="auth-divider"><span>hoặc đăng nhập với</span></div>
      <div style="display:flex;gap:12px;">
        <button onclick="showToast('Tính năng sắp ra mắt!','error')" style="flex:1;padding:12px;background:var(--dark3);border:1px solid rgba(255,255,255,0.08);color:white;border-radius:12px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font-body);">
          <i class="fab fa-facebook-f" style="color:#1877f2"></i> Facebook
        </button>
        <button onclick="showToast('Tính năng sắp ra mắt!','error')" style="flex:1;padding:12px;background:var(--dark3);border:1px solid rgba(255,255,255,0.08);color:white;border-radius:12px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font-body);">
          <i class="fab fa-google" style="color:#ea4335"></i> Google
        </button>
      </div>
      <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--gray);">
        Chưa có tài khoản? <a href="#" onclick="switchTab('register');return false;" style="color:var(--orange);">Đăng ký ngay</a>
      </p>
      <!-- Demo hint -->
      <div style="margin-top:20px;padding:12px;background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.2);border-radius:12px;font-size:12px;line-height:1.8;">
        <p style="color:var(--orange);font-weight:700;margin-bottom:4px;">Demo accounts:</p>
        <p>👤 User: <code>user@demo.com</code> / <code>123456</code></p>
        <p>🔐 Admin: <code>admin@yoyosniper.vn</code> / <code>admin123</code></p>
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div class="auth-form" id="registerForm">
      <div class="form-row">
        <div class="form-group">
          <label>Họ và tên *</label>
          <input type="text" id="regName" placeholder="Nguyễn Văn A"/>
        </div>
        <div class="form-group">
          <label>Số điện thoại *</label>
          <input type="tel" id="regPhone" placeholder="0905 123 456"/>
        </div>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="regEmail" placeholder="email@example.com"/>
      </div>
      <div class="form-group">
        <label>Mật khẩu *</label>
        <div style="position:relative;">
          <input type="password" id="regPassword" placeholder="Tối thiểu 6 ký tự" style="padding-right:48px;"/>
          <button onclick="togglePwd('regPassword',this)" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray);cursor:pointer;font-size:16px;"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <div class="form-group">
        <label>Xác nhận mật khẩu *</label>
        <input type="password" id="regConfirm" placeholder="Nhập lại mật khẩu"/>
      </div>
      <div style="margin-bottom:20px;">
        <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:13px;color:var(--gray);">
          <input type="checkbox" id="agreeTerms" style="margin-top:2px;accent-color:var(--orange);"/>
          Tôi đồng ý với <a href="#" style="color:var(--orange);">Điều khoản dịch vụ</a> và <a href="#" style="color:var(--orange);">Chính sách bảo mật</a>
        </label>
      </div>
      <button class="btn-full" onclick="doRegister()">
        <i class="fas fa-user-plus"></i> Tạo Tài Khoản
      </button>
      <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--gray);">
        Đã có tài khoản? <a href="#" onclick="switchTab('login');return false;" style="color:var(--orange);">Đăng nhập</a>
      </p>
    </div>
  </div>
</section>

<script src="../js/products.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/main.js"></script>
<script>
// Seed default admin if not exists
(function() {
  const users = JSON.parse(localStorage.getItem('yoyo_users') || '[]');
  if (!users.find(u => u.email === 'admin@yoyosniper.vn')) {
    users.push({ id: 'admin-001', name: 'Admin', email: 'admin@yoyosniper.vn', password: 'admin123', phone: '0905000000', role: 'admin' });
    localStorage.setItem('yoyo_users', JSON.stringify(users));
  }
  if (!users.find(u => u.email === 'user@demo.com')) {
    users.push({ id: 'user-001', name: 'Demo User', email: 'user@demo.com', password: '123456', phone: '0905123456', role: 'user' });
    localStorage.setItem('yoyo_users', JSON.stringify(users));
  }
})();

function switchTab(tab) {
  document.getElementById('loginForm').classList.toggle('active', tab === 'login');
  document.getElementById('registerForm').classList.toggle('active', tab === 'register');
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
}

function togglePwd(id, btn) {
  const input = document.getElementById(id);
  const isPass = input.type === 'password';
  input.type = isPass ? 'text' : 'password';
  btn.innerHTML = isPass ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
}

function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPassword').value;
  if (!email || !pass) { showToast('Vui lòng nhập đầy đủ thông tin!', 'error'); return; }

  const users = JSON.parse(localStorage.getItem('yoyo_users') || '[]');
  const user = users.find(u => (u.email === email || u.phone === email) && u.password === pass);

  if (!user) { showToast('Email hoặc mật khẩu không đúng!', 'error'); return; }

  localStorage.setItem('yoyo_user', JSON.stringify(user));
  showToast(`Chào mừng, ${user.name}! 🎉`);

  setTimeout(() => {
    if (user.role === 'admin') {
      window.location.href = 'admin.html';
    } else {
      window.location.href = '../index.html';
    }
  }, 1200);
}

function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPassword').value;
  const confirm = document.getElementById('regConfirm').value;
  const agree = document.getElementById('agreeTerms').checked;

  if (!name || !phone || !email || !pass) { showToast('Vui lòng điền đầy đủ!', 'error'); return; }
  if (pass.length < 6) { showToast('Mật khẩu tối thiểu 6 ký tự!', 'error'); return; }
  if (pass !== confirm) { showToast('Mật khẩu xác nhận không khớp!', 'error'); return; }
  if (!agree) { showToast('Vui lòng đồng ý điều khoản!', 'error'); return; }

  const users = JSON.parse(localStorage.getItem('yoyo_users') || '[]');
  if (users.find(u => u.email === email)) { showToast('Email đã được sử dụng!', 'error'); return; }

  const newUser = { id: 'u' + Date.now(), name, phone, email, password: pass, role: 'user', createdAt: new Date().toISOString() };
  users.push(newUser);
  localStorage.setItem('yoyo_users', JSON.stringify(users));
  localStorage.setItem('yoyo_user', JSON.stringify(newUser));

  showToast('Đăng ký thành công! 🎉');
  setTimeout(() => { window.location.href = '../index.html'; }, 1200);
}
</script>
</body>
</html>
